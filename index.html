<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo VV - Panorama Virtuel</title>
    <meta name="description" content="Visite virtuelle interactive en panorama VR">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #000;
            overflow: hidden;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="pano" style="width:100%;height:100%;">
            <noscript>
                <p>Veuillez activer JavaScript pour visualiser le panorama virtuel.</p>
            </noscript>
        </div>
    </div>

    <!-- Pano2VR Player -->
    <script type="text/javascript" src="pano2vr_player.js"></script>
    <script type="text/javascript" src="skin.js"></script>
    
    <script type="text/javascript">
        // Configuration du panorama
        window.addEventListener('DOMContentLoaded', function() {
            var pano = new pano2vrPlayer("pano");
            var skin = new pano2vrSkin(pano);
            
            // Charger le tour virtuel
            pano.readConfigUrlAsync("pano.xml");
        });
    </script>
</body>
</html>
