<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo VV - Panorama Virtuel</title>
    <meta name="description" content="Visite virtuelle interactive en panorama VR">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #000;
            overflow: hidden;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="loading">Chargement du panorama VR...</div>
    <div id="container">
        <div id="pano" style="width:100%;height:100%;">
            <noscript>
                <p style="color: white; text-align: center; margin-top: 50vh;">
                    Veuillez activer JavaScript pour visualiser le panorama virtuel.
                </p>
            </noscript>
        </div>
    </div>

    <!-- Pano2VR Player -->
    <script type="text/javascript" src="./pano2vr_player.js"></script>
    <script type="text/javascript" src="./skin.js"></script>
    
    <script type="text/javascript">
        // Configuration du panorama
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing panorama...');
            
            // Vérifier que les scripts sont chargés
            if (typeof pano2vrPlayer === 'undefined') {
                console.error('pano2vrPlayer not found');
                document.getElementById('loading').innerHTML = 'Erreur: Impossible de charger le lecteur panoramique';
                return;
            }
            
            if (typeof pano2vrSkin === 'undefined') {
                console.error('pano2vrSkin not found');
                document.getElementById('loading').innerHTML = 'Erreur: Impossible de charger l\'interface';
                return;
            }
            
            try {
                // Initialiser le panorama
                var pano = new pano2vrPlayer("pano");
                var skin = new pano2vrSkin(pano);
                
                // Masquer le loading une fois prêt
                pano.readConfigUrlAsync("./pano.xml", function() {
                    document.getElementById('loading').style.display = 'none';
                    console.log('Panorama loaded successfully');
                });
                
            } catch (error) {
                console.error('Error initializing panorama:', error);
                document.getElementById('loading').innerHTML = 'Erreur lors de l\'initialisation du panorama';
            }
        });
    </script>
</body>
</html>
